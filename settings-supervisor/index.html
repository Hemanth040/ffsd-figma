<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FarmOps</title>
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="settings-page">
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='../supervisor-dashboard/index.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="header-title-group">
                    <h1 class="page-title">Settings</h1>
                    <p class="page-subtitle">Manage your account settings</p>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="settings-container">
                <div class="settings-card">
                    <h2 class="card-title">Account Settings</h2>
                    <div class="settings-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="fullName">Full Name</label>
                                <input type="text" id="fullName" class="form-input" value="John Supervisor">
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" class="form-input" value="john.supervisor@email.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" class="form-input" value="+91 9876543210">
                            </div>
                            <div class="form-group">
                                <label for="role">Role</label>
                                <input type="text" id="role" class="form-input" value="Supervisor" disabled>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-secondary">Cancel</button>
                            <button class="btn btn-primary">Save Changes</button>
                        </div>
                    </div>
                </div>

                <div class="settings-card">
                    <h2 class="card-title">Change Password</h2>
                    <div class="settings-form">
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <input type="password" id="newPassword" class="form-input" placeholder="Enter new password">
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary">Update Password</button>
                        </div>
                    </div>
                </div>

                <div class="settings-card">
                    <h2 class="card-title">Notification Preferences</h2>
                    <div class="notification-settings">
                        <div class="notification-item">
                            <div class="notification-info">
                                <span class="notification-label">Task Assignments</span>
                                <span class="notification-desc">Receive notifications for new task assignments</span>
                            </div>
                            <label class="toggle">
                                <input type="checkbox" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="notification-item">
                            <div class="notification-info">
                                <span class="notification-label">Issue Alerts</span>
                                <span class="notification-desc">Get notified about new reported issues</span>
                            </div>
                            <label class="toggle">
                                <input type="checkbox" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="notification-item">
                            <div class="notification-info">
                                <span class="notification-label">Weather Updates</span>
                                <span class="notification-desc">Receive weather alerts and forecasts</span>
                            </div>
                            <label class="toggle">
                                <input type="checkbox">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
