<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Crop Timeline - FarmOps</title>
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Modify Crop Timeline</h1>
                    <p class="page-subtitle">Update crop schedule and activities</p>
                </div>
            </div>
        </div>

        <div class="timeline-container card">
            <h2>Edit Timeline</h2>
            <form class="timeline-form">
                <div class="form-group">
                    <label>Activity</label>
                    <input type="text" value="Fertilizer Application">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Scheduled Date</label>
                        <input type="date" value="2026-03-25">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select>
                            <option>Pending</option>
                            <option selected>Completed</option>
                            <option>Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea>Urea applied to entire wheat field</textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../global/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
