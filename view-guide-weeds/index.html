<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weeds Guide - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Weeds Guide</h1>
                </div>
            </div>
        </div>

        <div class="weeds-content card">
            <h2>Common Weeds</h2>
            <div class="weed-list">
                <div class="weed-item">
                    <div class="weed-info">
                        <h3>Phyllanthus Niruri</h3>
                        <p>Also known as Stonebreaker</p>
                    </div>
                    <span class="badge badge-warning">Common</span>
                </div>
                <div class="weed-item">
                    <div class="weed-info">
                        <h3>Cynodon Dactylon</h3>
                        <p>Also known as Bermuda Grass</p>
                    </div>
                    <span class="badge badge-danger">Hard to Control</span>
                </div>
                <div class="weed-item">
                    <div class="weed-info">
                        <h3>Parthenium Hysterophorus</h3>
                        <p>Also known as Carrot Grass</p>
                    </div>
                    <span class="badge badge-danger">Invasive</span>
                </div>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
