<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="reminders-page">
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.history.back()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="header-title-group">
                    <h1 class="page-title">Reminders</h1>
                </div>
            </div>
            <button class="add-reminder-btn" id="addReminderBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Reminder
            </button>
        </header>

        <main class="main-content">
            <div class="reminders-list">
                <div class="reminder-card">
                    <div class="reminder-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="reminder-details">
                        <h3 class="reminder-title">Irrigate Wheat Field</h3>
                        <p class="reminder-time">Today 4:00 PM</p>
                    </div>
                    <span class="reminder-badge badge-high">high</span>
                </div>

                <div class="reminder-card">
                    <div class="reminder-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="reminder-details">
                        <h3 class="reminder-title">Apply Fertilizer to Corn</h3>
                        <p class="reminder-time">Tomorrow 10:00 AM</p>
                    </div>
                    <span class="reminder-badge badge-high">high</span>
                </div>

                <div class="reminder-card">
                    <div class="reminder-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="reminder-details">
                        <h3 class="reminder-title">Harvest Tomatoes</h3>
                        <p class="reminder-time">March 5</p>
                    </div>
                    <span class="reminder-badge badge-medium">medium</span>
                </div>

                <div class="reminder-card">
                    <div class="reminder-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="reminder-details">
                        <h3 class="reminder-title">Worker Salary Payment</h3>
                        <p class="reminder-time">March 7</p>
                    </div>
                    <span class="reminder-badge badge-low">low</span>
                </div>

                <div class="reminder-card">
                    <div class="reminder-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="reminder-details">
                        <h3 class="reminder-title">Supervisor Meeting</h3>
                        <p class="reminder-time">March 10</p>
                    </div>
                    <span class="reminder-badge badge-medium">medium</span>
                </div>

                <div class="reminder-card">
                    <div class="reminder-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="reminder-details">
                        <h3 class="reminder-title">Pesticide Spray - Rice Field</h3>
                        <p class="reminder-time">March 12</p>
                    </div>
                    <span class="reminder-badge badge-high">high</span>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
