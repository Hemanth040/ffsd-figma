<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Farmer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <button class="back-btn" onclick="window.location.href='../supervisor-dashboard/index.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-content">
                <h1>Chat with Farmer</h1>
                <div class="farmer-info">
                    <span class="farmer-name">Ranvijay</span>
                    <span class="online-status">
                        <span class="online-dot"></span>
                        online
                    </span>
                </div>
            </div>
        </header>

        <div class="chat-card">
            <div class="chat-header-line">
                <h2>Ranvijay</h2>
                <span class="today-label">TODAY</span>
            </div>
            
            <div class="chat-messages">
                <div class="message farmer-message">
                    <div class="message-content">
                        <p>Farmer</p>
                        <p class="message-text">Will review and send update by evening</p>
                        <span class="message-time">10:30 AM</span>
                    </div>
                </div>

                <div class="message you-message">
                    <div class="message-content">
                        <p class="message-text">Please check the wheat field health report</p>
                        <span class="message-time">10:45 AM</span>
                    </div>
                </div>

                <div class="message farmer-message">
                    <div class="message-content">
                        <p>Farmer</p>
                        <p class="message-text">Attendance sheet attached</p>
                        <span class="message-time">11:20 AM</span>
                    </div>
                </div>

                <div class="message you-message">
                    <div class="message-content">
                        <p class="message-text">Also need attendance records for this week</p>
                        <span class="message-time">2:15 PM</span>
                    </div>
                </div>
            </div>

            <div class="chat-input">
                <input type="text" placeholder="Type your message..." id="messageInput">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
