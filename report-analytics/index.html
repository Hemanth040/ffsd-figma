<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report & Analytics - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Report & Analytics</h1>
                    <p class="page-subtitle">Insights into your farm performance</p>
                </div>
                <button class="btn btn-secondary">Export Report</button>
            </div>
        </div>

        <div class="analytics-container">
            <div class="analytics-cards">
                <div class="analytics-card">
                    <h3>Total Production</h3>
                    <p class="analytics-value">12,500 kg</p>
                    <p class="analytics-change positive">+15% from last month</p>
                </div>
                <div class="analytics-card">
                    <h3>Revenue</h3>
                    <p class="analytics-value">₹4,25,000</p>
                    <p class="analytics-change positive">+8% from last month</p>
                </div>
                <div class="analytics-card">
                    <h3>Expenses</h3>
                    <p class="analytics-value">₹1,80,000</p>
                    <p class="analytics-change negative">+5% from last month</p>
                </div>
            </div>

            <div class="chart-section card">
                <h2>Monthly Production Trend</h2>
                <div class="chart-placeholder">
                    <div class="chart-bar" style="height: 60%"></div>
                    <div class="chart-bar" style="height: 75%"></div>
                    <div class="chart-bar" style="height: 45%"></div>
                    <div class="chart-bar" style="height: 90%"></div>
                    <div class="chart-bar" style="height: 80%"></div>
                    <div class="chart-bar" style="height: 65%"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
