<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Edit Task</h1>
                </div>
            </div>
        </div>

        <div class="edit-task-container card">
            <form class="task-form">
                <div class="form-group">
                    <label>Task Name</label>
                    <input type="text" value="Irrigation - Wheat Field">
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select>
                        <option>Ramu</option>
                        <option>Lakshman</option>
                        <option>Krishna</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" value="2026-03-20">
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select>
                            <option>Low</option>
                            <option selected>Medium</option>
                            <option>High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea>Water the entire wheat field in section B</textarea>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option>Pending</option>
                        <option selected>Completed</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary">Save Changes</button>
                    <a href="../task-details-farmer/index.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
