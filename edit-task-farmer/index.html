<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="edit-task-page">
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='../task-details-farmer/index.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="header-title-group">
                    <h1 class="page-title">Edit Task</h1>
                    <p class="page-subtitle">Update task details and assignments</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='../task-details-farmer/index.html'">Cancel</button>
                <button class="btn btn-primary" id="saveChangesBtn">Save Changes</button>
            </div>
        </header>

        <main class="main-content">
            <div class="form-container">
                <div class="form-section">
                    <h2 class="section-title">Basic Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="taskTitle">Task Title</label>
                            <input type="text" id="taskTitle" class="form-input" value="Plow Field A" placeholder="Enter task title">
                        </div>
                        <div class="form-group">
                            <label for="shortDesc">Short Description</label>
                            <input type="text" id="shortDesc" class="form-input" value="Prepare field for wheat sowing" placeholder="Enter short description">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="status">Status</label>
                                <div class="select-wrapper">
                                    <select id="status" class="form-select">
                                        <option value="pending">Pending</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="completed" selected>Completed</option>
                                        <option value="cancelled">Cancelled</option>
                                    </select>
                                    <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M6 9l6 6 6-6"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="priority">Priority</label>
                                <div class="select-wrapper">
                                    <select id="priority" class="form-select">
                                        <option value="low">Low</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="high">High</option>
                                        <option value="urgent">Urgent</option>
                                    </select>
                                    <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M6 9l6 6 6-6"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="section-title">Task Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fieldLocation">Field Location</label>
                            <input type="text" id="fieldLocation" class="form-input" value="Field A, West Section - 2 km from main farm office" placeholder="Enter field location">
                        </div>
                        <div class="form-group">
                            <label for="detailedDesc">Detailed Description</label>
                            <textarea id="detailedDesc" class="form-textarea" placeholder="Enter detailed description">Use the tractor and plow attachment to prepare the soil for wheat sowing. Ensure the soil is turned to a depth of at least 6 inches.</textarea>
                        </div>
                        <div class="form-group">
                            <label for="equipment">Equipment Required</label>
                            <div class="tags-input">
                                <div class="tag">
                                    <span>Tractor</span>
                                    <button type="button" class="tag-remove">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"/>
                                            <line x1="6" y1="6" x2="18" y2="18"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="tag">
                                    <span>Plow</span>
                                    <button type="button" class="tag-remove">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"/>
                                            <line x1="6" y1="6" x2="18" y2="18"/>
                                        </svg>
                                    </button>
                                </div>
                                <input type="text" class="tag-input" placeholder="Add equipment...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
