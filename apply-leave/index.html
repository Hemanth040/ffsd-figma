<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Leave - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="leave-page">
        <header class="page-header">
            <button class="back-btn" onclick="window.history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-title-group">
                <div class="header-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <h1 class="page-title">Apply for Leave</h1>
            </div>
        </header>

        <main class="main-content">
            <div class="leave-form-container">
                <div class="form-card">
                    <label class="form-label">Leave Type</label>
                    <div class="leave-type-options">
                        <button class="leave-type-btn active">
                            <div class="btn-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                                </svg>
                            </div>
                            Sick Leave
                        </button>
                        <button class="leave-type-btn">
                            <div class="btn-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            Personal
                        </button>
                        <button class="leave-type-btn">
                            <div class="btn-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="5"/>
                                    <line x1="12" y1="1" x2="12" y2="3"/>
                                    <line x1="12" y1="21" x2="12" y2="23"/>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                    <line x1="1" y1="12" x2="3" y2="12"/>
                                    <line x1="21" y1="12" x2="23" y2="12"/>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                                </svg>
                            </div>
                            Vacation
                        </button>
                    </div>
                </div>

                <div class="form-card">
                    <label class="form-label">Duration</label>
                    <div class="duration-options">
                        <button class="duration-btn">Half Day</button>
                        <button class="duration-btn active">Full Day</button>
                    </div>
                </div>

                <div class="form-card">
                    <div class="date-inputs">
                        <div class="form-group">
                            <label class="form-label">START DATE</label>
                            <input type="date" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">END DATE</label>
                            <input type="date" class="form-input">
                        </div>
                    </div>
                </div>

                <div class="form-card">
                    <label class="form-label">Reason for Leave</label>
                    <textarea class="form-textarea" placeholder="Please provide a brief explanation..."></textarea>
                </div>

                <div class="form-actions">
                    <button class="btn-cancel">Cancel</button>
                    <button class="btn-submit">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        Submit Leave Request
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
