<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Leave - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Worker" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Apply for Leave</h1>
                </div>
            </div>
        </div>

        <div class="leave-form-container card">
            <form class="leave-form">
                <div class="form-group">
                    <label>Leave Type</label>
                    <select>
                        <option>Sick Leave</option>
                        <option>Casual Leave</option>
                        <option>Emergency Leave</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date">
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date">
                    </div>
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea placeholder="Enter reason for leave..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary">Submit Request</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
