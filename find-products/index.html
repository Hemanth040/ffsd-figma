<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Products - FarmOps</title>
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Find Products</h1>
                    <p class="page-subtitle">Browse fertilizers, pesticides, and seeds</p>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" placeholder="Search products...">
        </div>

        <div class="products-grid">
            <div class="product-card">
                <div class="product-icon">🧪</div>
                <h3>Urea Fertilizer</h3>
                <p>Nitrogen fertilizer for crop growth</p>
                <span class="price">₹300/bag</span>
                <button class="btn btn-primary">Add to Cart</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🧪</div>
                <h3>DAP Fertilizer</h3>
                <p>Phosphorus fertilizer</p>
                <span class="price">₹1350/bag</span>
                <button class="btn btn-primary">Add to Cart</button>
            </div>
            <div class="product-card">
                <div class="product-icon">💊</div>
                <h3>Chlorpyrifos</h3>
                <p>Insecticide for pest control</p>
                <span class="price">₹450/L</span>
                <button class="btn btn-primary">Add to Cart</button>
            </div>
        </div>
    </main>

    <script src="../global/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
