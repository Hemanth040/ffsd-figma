<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Supervisor</title>
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <button class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="supervisor-info">
                <div class="avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ranvijay" alt="Supervisor Avatar">
                </div>
                <div class="supervisor-details">
                    <h1>Chat with Supervisor</h1>
                    <div class="status">
                        <span class="online-dot"></span>
                        <span class="supervisor-name">Ranvijay Sharma</span>
                        <span class="online-text">online</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="chat-content">
            <div class="date-divider">
                <div class="line"></div>
                <span>TODAY</span>
                <div class="line"></div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="message supervisor-message">
                    <div class="message-bubble">
                        <p class="sender-name">Supervisor</p>
                        <p class="message-text">Please check the wheat field health report</p>
                        <p class="message-time">10:30 AM</p>
                    </div>
                </div>

                <div class="message user-message">
                    <div class="message-bubble">
                        <p class="sender-name">You</p>
                        <p class="message-text">Will review and send update by evening</p>
                        <p class="message-time">10:45 AM</p>
                    </div>
                </div>

                <div class="message supervisor-message">
                    <div class="message-bubble">
                        <p class="sender-name">Supervisor Sharma</p>
                        <p class="message-text">Also need attendance records for this week</p>
                        <p class="message-time">11:20 AM</p>
                    </div>
                </div>

                <div class="message user-message">
                    <div class="message-bubble">
                        <p class="sender-name">You</p>
                        <p class="message-text">Attendance sheet attached</p>
                        <p class="message-time">2:15 PM</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message...">
                <button class="send-btn" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
