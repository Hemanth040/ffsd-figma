<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Details - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="worker-details-container">
            <div class="worker-profile card">
                <div class="profile-header">
                    <div class="profile-avatar">R</div>
                    <div class="profile-info">
                        <h1>Ramu</h1>
                        <p>Farm Worker</p>
                        <span class="badge badge-success">Active</span>
                    </div>
                </div>
            </div>

            <div class="worker-stats">
                <div class="stat-card">
                    <span class="stat-value">95%</span>
                    <span class="stat-label">Attendance</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">8</span>
                    <span class="stat-label">Years Working</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">₹500</span>
                    <span class="stat-label">Daily Wage</span>
                </div>
            </div>

            <div class="worker-info card">
                <h2>Contact Information</h2>
                <div class="info-list">
                    <div class="info-item">
                        <span class="label">Phone</span>
                        <span class="value">+91 9876543210</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Address</span>
                        <span class="value">Village Ramapuram, District Namakkal</span>
                    </div>
                </div>
            </div>

            <div class="worker-tasks card">
                <h2>Recent Tasks</h2>
                <div class="task-list">
                    <div class="task-item">
                        <span>Irrigation - Wheat Field</span>
                        <span class="badge badge-success">Completed</span>
                    </div>
                    <div class="task-item">
                        <span>Fertilizer Application</span>
                        <span class="badge badge-success">Completed</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
