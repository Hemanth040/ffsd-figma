<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="task-details-container">
            <div class="task-header card">
                <h1>Irrigation - Wheat Field</h1>
                <span class="badge badge-success">Completed</span>
            </div>

            <div class="task-info card">
                <div class="info-row">
                    <span class="label">Assigned To</span>
                    <span class="value">Ramu</span>
                </div>
                <div class="info-row">
                    <span class="label">Due Date</span>
                    <span class="value">Mar 20, 2026</span>
                </div>
                <div class="info-row">
                    <span class="label">Priority</span>
                    <span class="badge badge-warning">Medium</span>
                </div>
                <div class="info-row">
                    <span class="label">Description</span>
                    <span class="value">Water the entire wheat field in section B</span>
                </div>
            </div>

            <div class="task-actions">
                <a href="../edit-task-farmer/index.html" class="btn btn-primary">Edit Task</a>
                <button class="btn btn-secondary">Delete</button>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
