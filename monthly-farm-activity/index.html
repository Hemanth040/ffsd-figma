<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Farm Activity - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Monthly Farm Activity</h1>
                </div>
            </div>
        </div>

        <div class="activity-container">
            <div class="month-selector">
                <select>
                    <option>March 2026</option>
                    <option>February 2026</option>
                    <option>January 2026</option>
                </select>
            </div>

            <div class="activity-list">
                <div class="activity-item">
                    <div class="activity-date">Mar 25</div>
                    <div class="activity-content">
                        <h3>Fertilizer Applied</h3>
                        <p>Urea applied to wheat field - 5 acres</p>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="activity-date">Mar 20</div>
                    <div class="activity-content">
                        <h3>Irrigation</h3>
                        <p>Watered all crop fields</p>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="activity-date">Mar 15</div>
                    <div class="activity-content">
                        <h3>Pest Inspection</h3>
                        <p>Weekly pest inspection completed</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
