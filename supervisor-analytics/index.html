<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Analytics - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Supervisor" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Analytics & Reports</h1>
                </div>
            </div>
        </div>

        <div class="analytics-grid">
            <div class="analytics-card">
                <h3>Total Workers</h3>
                <span class="value">12</span>
            </div>
            <div class="analytics-card">
                <h3>Tasks Completed</h3>
                <span class="value">48</span>
            </div>
            <div class="analytics-card">
                <h3>Issues Reported</h3>
                <span class="value">5</span>
            </div>
            <div class="analytics-card">
                <h3>Crops Active</h3>
                <span class="value">4</span>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
