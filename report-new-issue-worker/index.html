<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report New Issue - FarmOps</title>
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Worker" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Report New Issue</h1>
                </div>
            </div>
        </div>

        <div class="report-form-container card">
            <form class="report-form">
                <div class="form-group">
                    <label>Issue Type</label>
                    <select>
                        <option>Equipment Problem</option>
                        <option>Pest/Disease</option>
                        <option>Infrastructure</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" placeholder="e.g., Field B">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea placeholder="Describe the issue..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary">Submit Report</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../global/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
