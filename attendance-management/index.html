<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management - FarmOps</title>
    <link rel="stylesheet" href="../common/global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container" data-navbar data-user-name="John Farmer" data-user-initial="J" data-active-page=""></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title">Attendance Management</h1>
                    <p class="page-subtitle">Track and manage worker attendance</p>
                </div>
                <button class="btn btn-primary">Mark Attendance</button>
            </div>
        </div>

        <div class="attendance-container">
            <div class="attendance-stats">
                <div class="stat-card">
                    <span class="stat-value">12</span>
                    <span class="stat-label">Total Workers</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">10</span>
                    <span class="stat-label">Present Today</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">2</span>
                    <span class="stat-label">Absent</span>
                </div>
            </div>

            <div class="attendance-table card">
                <table>
                    <thead>
                        <tr>
                            <th>Worker</th>
                            <th>Role</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Ramu</td>
                            <td>Farm Worker</td>
                            <td>06:30 AM</td>
                            <td>05:00 PM</td>
                            <td><span class="badge badge-success">Present</span></td>
                        </tr>
                        <tr>
                            <td>Lakshman</td>
                            <td>Supervisor</td>
                            <td>06:00 AM</td>
                            <td>06:00 PM</td>
                            <td><span class="badge badge-success">Present</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../common/navbar.js"></script>
    <script src="script.js"></script>
</body>
</html>
